# ── WiFi (nRF7002 via QSPI) ──────────────────────────────────────────
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_NET_L2_ETHERNET=y

CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_STATIC=y
CONFIG_WIFI_CREDENTIALS_STATIC_SSID="AirPennNet-Device"
CONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD="penn1740wifi"
CONFIG_WIFI_CREDENTIALS_STATIC_TYPE_PSK=y

# ── Networking stack ─────────────────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

# ── HTTP + WebSocket ─────────────────────────────────────────────────
CONFIG_HTTP_CLIENT=y
CONFIG_WEBSOCKET_CLIENT=y

# ── Network buffers ──────────────────────────────────────────────────
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NRF70_RX_NUM_BUFS=16
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_TC_TX_COUNT=1

# ── Heap / memory ────────────────────────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=37000
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=20000
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=40000

# ── Stack sizes ──────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=5200
CONFIG_NET_TX_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ── Do NOT overwrite our baremetal network core ──────────────────────
CONFIG_NRF53_UPGRADE_NETWORK_CORE=n

# ── GPIO (for SPU configuration) ────────────────────────────────────
CONFIG_GPIO=y

# ── Logging ──────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_NET_LOG=y

# ── Console ──────────────────────────────────────────────────────────
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# ── POSIX API (for socket functions) ─────────────────────────────────
CONFIG_POSIX_API=y
